<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Almas labyrintspill</title>
<style>
  :root {
    --bg: #fef9f3; --panel: #ffffff; --ink: #2b2b3a; --accent: #6c5ce7;
    --good: #2ecc71; --bad: #e74c3c; --grid: #efe7dd;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: var(--bg); color: var(--ink);
    font-family: "Baloo 2", "Comic Sans MS", system-ui, -apple-system, sans-serif;
  }
  /* Stående format tilpasset iPhone og iPad */
  #app {
    height: 100dvh; max-width: 820px; margin: 0 auto;
    display: flex; flex-direction: column;
    padding: max(8px, env(safe-area-inset-top)) 10px max(10px, env(safe-area-inset-bottom)) 10px;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 6px; margin-bottom: 6px; flex-wrap: wrap;
  }
  h1 { font-size: clamp(16px, 5vw, 22px); margin: 0; color: var(--accent); white-space: nowrap; }
  .pill {
    background: var(--panel); border-radius: 14px; padding: 6px 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08); font-weight: 700; font-size: clamp(13px,3.6vw,16px);
  }
  .pill .num { color: var(--accent); }
  .stats { display: flex; gap: 6px; }
  .toolbar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
  button {
    font-family: inherit; font-weight: 700; font-size: clamp(13px,3.6vw,15px);
    border: none; border-radius: 13px; padding: 9px 13px; cursor: pointer;
    background: var(--accent); color: #fff; box-shadow: 0 3px 0 rgba(0,0,0,0.12);
    transition: transform .05s;
  }
  button.secondary { background: #fff; color: var(--ink); }
  button:active { transform: translateY(2px); box-shadow: none; }
  .hint { color: #8a8a9a; font-size: clamp(12px,3.3vw,14px); margin: 2px 2px 6px; text-align: center; }
  #boardWrap {
    position: relative; flex: 1 1 auto; min-height: 0;
    background: var(--panel); border-radius: 20px; padding: 10px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    display: flex; justify-content: center; align-items: center;
  }
  svg { touch-action: manipulation; max-width: 100%; max-height: 100%; }
  .cell-grid { stroke: var(--grid); stroke-width: 1; }
  .piece { cursor: pointer; }
  .piece .stroke { transition: stroke .1s, fill .1s; }
  .piece.crash .stroke { stroke: var(--bad) !important; fill: var(--bad) !important; }
  .piece.crash { animation: shake .32s; }
  @keyframes shake {
    0%,100%{ transform: translate(var(--tx), var(--ty)); }
    25%{ transform: translate(var(--tx), var(--ty)) rotate(-2.5deg); }
    75%{ transform: translate(var(--tx), var(--ty)) rotate(2.5deg); }
  }
  .float {
    position: absolute; font-weight: 800; font-size: clamp(18px,5vw,24px);
    pointer-events: none; animation: rise .9s ease-out forwards;
  }
  @keyframes rise { from{opacity:1; transform: translateY(0);} to{opacity:0; transform: translateY(-44px);} }
  .overlay {
    position: absolute; inset: 0; background: rgba(255,255,255,0.95);
    border-radius: 20px; display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px; text-align: center;
    padding: 16px; overflow: auto;
  }
  .overlay.show { display: flex; }
  .overlay h2 { font-size: clamp(22px,7vw,32px); margin: 0; }
  .picker { display: grid; grid-template-columns: repeat(auto-fill, minmax(78px, 1fr)); gap: 10px; width: 100%; max-width: 560px; }
  .icon-btn {
    background: #fff; border-radius: 14px; padding: 8px; cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08); text-align: center; font-weight: 700; font-size: 12px;
  }
  .icon-btn svg { display: block; margin: 0 auto 4px; }
  table.hs { border-collapse: collapse; font-size: clamp(13px,3.6vw,15px); margin: 4px auto; }
  table.hs th, table.hs td { padding: 5px 12px; text-align: center; }
  table.hs th { color: var(--accent); border-bottom: 2px solid var(--grid); }
  table.hs tr.me td { font-weight: 800; color: var(--accent); }
  #confetti { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }

  /* Sprettende poeng-tall ("smell" ved utkjøring, voksende rist-tall ved krasj) */
  .pop {
    position: absolute; font-weight: 900; pointer-events: none; white-space: nowrap;
    z-index: 20; transform: translate(-50%,-50%);
    text-shadow: 0 2px 0 rgba(0,0,0,0.14), 0 0 14px rgba(255,255,255,0.7);
  }
  .pop-good { font-size: clamp(26px,9vw,52px); animation: popGood .8s cubic-bezier(.18,1.5,.4,1) forwards; }
  .pop-crash { font-size: clamp(22px,7vw,40px); animation: popCrash .95s ease-out forwards; }
  @keyframes popGood {
    0%   { transform: translate(-50%,-50%) scale(0.2); opacity: 0; }
    22%  { transform: translate(-50%,-58%) scale(1.45); opacity: 1; }
    38%  { transform: translate(-50%,-62%) scale(1.0); opacity: 1; }
    100% { transform: translate(-50%,-150%) scale(1.15); opacity: 0; }
  }
  @keyframes popCrash {
    0%   { transform: translate(-50%,-50%) scale(0.4) rotate(0deg); opacity: 0; }
    12%  { transform: translate(-50%,-52%) scale(1.0) rotate(-9deg); opacity: 1; }
    28%  { transform: translate(-55%,-60%) scale(1.35) rotate(8deg); opacity: 1; }
    46%  { transform: translate(-46%,-70%) scale(1.75) rotate(-7deg); opacity: 1; }
    64%  { transform: translate(-53%,-82%) scale(2.15) rotate(5deg); opacity: 1; }
    100% { transform: translate(-50%,-160%) scale(2.7) rotate(0deg); opacity: 0; }
  }
  .combo {
    position: absolute; font-weight: 900; pointer-events: none; white-space: nowrap;
    z-index: 21; color: #ef6c3a; transform: translate(-50%,-50%);
    font-size: clamp(15px,5vw,24px); text-shadow: 0 2px 0 rgba(0,0,0,0.12);
    animation: comboPop 1.05s ease-out forwards;
  }
  @keyframes comboPop {
    0%   { transform: translate(-50%,-40%) scale(0.4); opacity: 0; }
    25%  { transform: translate(-50%,-105%) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%,-240%) scale(1.0); opacity: 0; }
  }
  .pill.bump { animation: pillBump .42s cubic-bezier(.2,1.6,.4,1); }
  @keyframes pillBump { 0%{transform:scale(1);} 35%{transform:scale(1.4);} 100%{transform:scale(1);} }

  /* Blinkende farekant (level 10+) + oransje forvarsel på neste kant */
  .danger-edge { animation: edgeBlink .7s ease-in-out infinite; }
  @keyframes edgeBlink { 0%,100%{opacity:0.95;} 50%{opacity:0.18;} }
  .danger-preview { animation: edgePreview .25s ease-in-out infinite alternate; }
  @keyframes edgePreview { from{opacity:0.4;} to{opacity:0.85;} }
  #boardWrap.flash { animation: boardFlash .45s ease-out; }
  @keyframes boardFlash {
    0%   { box-shadow: 0 0 0 0 rgba(231,76,60,0); }
    25%  { box-shadow: 0 0 0 7px rgba(231,76,60,0.55), 0 6px 18px rgba(0,0,0,0.08); }
    100% { box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
  }
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div id="app">
  <header>
    <h1>🧩 Almas labyrint</h1>
    <div class="stats">
      <div class="pill">Level <span class="num" id="level">1</span></div>
      <div class="pill">⏱ <span class="num" id="time">0:00</span></div>
      <div class="pill">⭐ <span class="num" id="score">100</span></div>
    </div>
  </header>

  <div class="toolbar">
    <button id="btnRestart">🔄 Restart</button>
    <button id="btnScores" class="secondary">🏆 Rekorder</button>
  </div>

  <div class="hint" id="status">Trykk en strek så den sklir UT av brettet. Jo raskere du fjerner streker, jo større bonus (og kjede!). Krasj koster poeng — og etter 10 sekunder tikker tiden også poeng nedover, så vær kjapp!</div>

  <div id="boardWrap">
    <svg id="board" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="overlay" id="overlay">
      <h2 id="overlayTitle"></h2>
      <div id="overlayBody"></div>
      <div id="overlayBtns"></div>
    </div>
    <div id="picker" class="overlay"></div>
  </div>
</div>

<script src="engine.js"></script>
<script src="icons.js"></script>
<script src="generator.js"></script>
<script>
(function () {
  "use strict";
  var CONFIG = Engine.DEFAULT_CONFIG; // startScore 100, exit +10, crash -10
  var RKEY = "alma_labyrint_records_v2";

  var $ = function (id) { return document.getElementById(id); };
  var svg = $("board"), boardWrap = $("boardWrap");
  var scoreEl = $("score"), levelEl = $("level"), timeEl = $("time"), statusEl = $("status");
  var overlay = $("overlay"), overlayTitle = $("overlayTitle"), overlayBody = $("overlayBody"), overlayBtns = $("overlayBtns");
  var picker = $("picker");

  var state = null, cell = 48, boardToken = 0;
  var mode = "journey", journeyIndex = 0;
  var journeyIcons = Icons.bySize();
  var runningScore = CONFIG.startScore, peakScore = CONFIG.startScore, levelsCompleted = 0;
  var currentIcon = null, currentDiff = 0.5;
  var boardStartScore = CONFIG.startScore, boardStartAccumMs = 0, boardMaxScore = 0;
  var crashCooldown = {};              // streker i kort nedkjøling etter krasj (hindrer dobbeltstraff)

  // Blinkende farekant (level 10+). dangerMode: 0=ingen, 1=unngå (−100),
  // 2=må treffe (−200 ellers). dangerEdge: hvilken kant blinker nå (U/D/L/R).
  var DANGER_INTERVAL_AVOID = 3000;    // rød (level 10–19): blinker 3 s før bytte
  var DANGER_INTERVAL_REQUIRE = 5000;  // grønn (level 20+): blinker 5 s før bytte
  var DANGER_PREVIEW_MS = 500;         // oransje forvarsel vises 0,5 s før byttet
  var EDGE_AVOID_PENALTY = 200;        // level 10–19: straff for å treffe blinkende kant
  var EDGE_REQUIRE_PENALTY = 200;      // level 20+: straff for å treffe FEIL kant
  var DANGER_LEVEL_AVOID = 10, DANGER_LEVEL_REQUIRE = 20;
  var dangerMode = 0, dangerEdge = null, dangerPreviewEdge = null;
  var dangerPreviewTimer = null, dangerSwitchTimer = null;
  var rulesShown = { avoid: false, require: false }; // regel-skjerm vises én gang per runde
  var accumMs = 0, lastTick = 0, timerActive = false, timerId = null, secApplied = 0;
  var TIME_PENALTY_GRACE_SEC = 10;    // ingen tidsstraff de første 10 sekundene
  var COMBO_WINDOW = 2500;            // ms: fjern raskere enn dette for å bygge kjede
  var SPEED_MAX = 20, SPEED_WINDOW = 2500; // hurtighetsbonus: lineær fra 20 (0 ms) til 0 (2,5 s)
  var COMBO_STEP = 3, COMBO_CAP = 15;      // kjede-bonus = min(streak,15)*3 (maks 45 per strek)
  var lastExitAccum = 0, combo = 0;   // hurtighetsbonus: belønner raske fjerninger

  // -- Rekorder (localStorage med fallback til minne) -----------------------
  // Flere kategorier: beste totalscore (topp 10), raskest løst level, flest
  // poeng på ett level, og høyeste level nådd.
  var memR = null;
  function emptyRecords() { return { totals: [], fastestLevel: null, mostLevelPoints: null, highestLevel: 0 }; }
  function loadRecords() {
    try { return JSON.parse(localStorage.getItem(RKEY)) || emptyRecords(); }
    catch (e) { return memR || emptyRecords(); }
  }
  function saveRecords(r) {
    try { localStorage.setItem(RKEY, JSON.stringify(r)); }
    catch (e) { memR = r; }
  }
  // Oppdater rekorder når et level er LØST.
  function recordLevelStats(level, icon, gain, sec) {
    var R = loadRecords();
    if (sec > 0 && (!R.fastestLevel || sec < R.fastestLevel.sec)) R.fastestLevel = { sec: sec, level: level, icon: icon };
    if (!R.mostLevelPoints || gain > R.mostLevelPoints.points) R.mostLevelPoints = { points: gain, level: level, icon: icon };
    if (level > (R.highestLevel || 0)) R.highestLevel = level;
    saveRecords(R);
  }
  // Lagre en hel runde (totalscore) når man taper.
  function recordTotalRun(entry) {
    var R = loadRecords();
    R.totals = R.totals || [];
    R.totals.push(entry);
    R.totals.sort(function (a, b) { return b.points - a.points || a.timeSec - b.timeSec; });
    R.totals = R.totals.slice(0, 10);
    saveRecords(R);
    return R;
  }
  // Bygg HTML for rekord-skjermen (me = denne rundens totalscore, kan være null).
  function recordsHtml(me) {
    var R = loadRecords();
    var fl = R.fastestLevel, mp = R.mostLevelPoints;
    var html = "<table class='hs'>" +
      "<tr><td>🚀 Høyeste level</td><td>" + (R.highestLevel || 0) + "</td></tr>" +
      "<tr><td>⚡ Raskest løst level</td><td>" + (fl ? (fl.sec.toFixed(1) + " s · L" + fl.level + " " + fl.icon) : "–") + "</td></tr>" +
      "<tr><td>⭐ Flest poeng på ett level</td><td>" + (mp ? (mp.points + " · L" + mp.level + " " + mp.icon) : "–") + "</td></tr>" +
      "</table>";
    if (R.totals && R.totals.length) {
      html += "<div class='hint'>Beste totalscore:</div><table class='hs'>" +
        "<tr><th></th><th>Poeng</th><th>Tid</th><th>Levels</th></tr>";
      R.totals.forEach(function (e) {
        var mine = me && e.date === me.date;
        html += "<tr class='" + (mine ? "me" : "") + "'><td>" + (mine ? "▶" : "") + "</td><td>" + e.points +
          "</td><td>" + fmtTime(e.timeSec) + "</td><td>" + e.levels + "</td></tr>";
      });
      html += "</table>";
    } else {
      html += "<div class='hint'>Ingen totalscore ennå.</div>";
    }
    return html;
  }

  // -- Tidtaking + poengtap per sekund -------------------------------------
  // Tiden (og poengtapet) teller bare mens man faktisk spiller — den pauses
  // mens overgangs-/sluttskjermer vises.
  function startTimer() {
    accumMs = 0; secApplied = 0; lastTick = Date.now(); timerActive = true;
    if (!timerId) timerId = setInterval(tick, 200);
    timeEl.textContent = fmtTime(0);
  }
  function stopTimer() { timerActive = false; }
  function overlayShown() { return overlay.classList.contains("show") || picker.classList.contains("show"); }
  function elapsedSec() { return Math.floor(accumMs / 1000); }
  function fmtTime(s) { var m = Math.floor(s / 60); return m + ":" + ("0" + (s % 60)).slice(-2); }
  function tick() {
    var now = Date.now();
    if (timerActive && !overlayShown()) accumMs += now - lastTick;
    lastTick = now;
    var secs = Math.floor(accumMs / 1000);
    // Trekk poeng for hvert hele sekund som har gått — men først ETTER fristen.
    while (secApplied < secs) {
      secApplied++;
      if (state && CONFIG.timePenaltyPerSec && secApplied > TIME_PENALTY_GRACE_SEC) {
        state.score -= CONFIG.timePenaltyPerSec;
        if (state.score < 0) state.score = 0;
      }
    }
    if (state) scoreEl.textContent = state.score;
    timeEl.textContent = fmtTime(secs);
    if (state && timerActive && !overlayShown() && state.score <= 0) onLose();
  }

  // -- Brett-oppsett --------------------------------------------------------
  function difficultyForIndex(i) { return Math.min(0.92, 0.12 + i * 0.13); } // level 1 enkel, deretter hardere

  // Nåværende level-nummer (1-basert). Fri modus har ikke levels -> 1 som basis.
  function currentLevel() { return mode === "journey" ? (journeyIndex + 1) : 1; }

  // Kollisjonsstraff vokser med level: 2× grunnstraff allerede fra level 1, og
  // +grunnstraff per level deretter (level L -> base*(1+L)).
  function crashForLevel(level) { return CONFIG.crashPenalty * (1 + level); }

  // Teoretisk maks poeng et brett kan gi: alle streker fjernet i én lynrask kjede
  // (full hurtighetsbonus + maksimal kjede-bonus), uten krasj, tidsstraff eller
  // farekant-straff. Må holdes i synk med computeExitBonus for forutsigbar maks.
  function maxScoreForPieces(n) {
    var total = 0;
    for (var i = 1; i <= n; i++) total += CONFIG.exitReward + SPEED_MAX + Math.min(i, COMBO_CAP) * COMBO_STEP;
    return total;
  }

  // Faremodus ut fra level: blinkende kant fra level 10, "kun riktig kant" fra 20.
  function dangerModeForLevel(level) {
    if (mode !== "journey") return 0;
    if (level >= DANGER_LEVEL_REQUIRE) return 2;
    if (level >= DANGER_LEVEL_AVOID) return 1;
    return 0;
  }

  function startRun(newMode) {
    mode = newMode;
    runningScore = CONFIG.startScore; peakScore = CONFIG.startScore; levelsCompleted = 0;
    rulesShown = { avoid: false, require: false };
    stopDanger();
    startTimer();
  }

  function loadLevel(icon, difficulty, seed) {
    currentIcon = icon; currentDiff = difficulty;
    var level = Generator.generate(icon, {
      seed: seed == null ? Math.floor(Math.random() * 1e9) : seed,
      difficulty: difficulty,
    });
    state = Engine.createBoard(level, {
      startScore: runningScore,
      crashPenalty: crashForLevel(currentLevel()),
    });
    boardStartScore = state.score;      // for poeng-oppsummering når brettet er løst
    boardStartAccumMs = accumMs;
    boardMaxScore = maxScoreForPieces(Object.keys(state.pieces).length);
    boardToken++;                       // nytt brett: avbryt ventende animasjoner (token-sjekk)
    crashCooldown = {};
    lastExitAccum = accumMs; combo = 0; // hurtighetsbonus starter på nytt per brett
    configureDanger();                  // start/stopp blinkende farekant for dette levelet
    fitCell(level); render();
    statusEl.textContent = "Figur: " + icon.name + "  ·  " + Object.keys(state.pieces).length + " streker igjen";
    hideOverlay();
  }

  function fitCell(level) {
    var availW = boardWrap.clientWidth - 20;
    var availH = boardWrap.clientHeight - 20;
    cell = Math.max(20, Math.min(72, Math.floor(Math.min(availW / level.cols, availH / level.rows))));
  }

  // -- Tegning --------------------------------------------------------------
  function render() {
    var rows = state.rows, cols = state.cols;
    svg.setAttribute("width", cols * cell);
    svg.setAttribute("height", rows * cell);
    svg.setAttribute("viewBox", "0 0 " + cols * cell + " " + rows * cell);
    while (svg.firstChild) svg.removeChild(svg.firstChild);
    for (var r = 0; r <= rows; r++) gridLine(0, r * cell, cols * cell, r * cell);
    for (var c = 0; c <= cols; c++) gridLine(c * cell, 0, c * cell, rows * cell);
    Object.keys(state.pieces).forEach(function (id) { drawPiece(state.pieces[id]); });
    drawDanger(); // tegnes sist så kanten/forvarselet ligger øverst
    scoreEl.textContent = state.score;
    levelEl.textContent = mode === "journey" ? (journeyIndex + 1) : "★";
  }

  function gridLine(x1, y1, x2, y2) {
    var l = document.createElementNS("http://www.w3.org/2000/svg", "line");
    l.setAttribute("x1", x1); l.setAttribute("y1", y1);
    l.setAttribute("x2", x2); l.setAttribute("y2", y2);
    l.setAttribute("class", "cell-grid");
    svg.appendChild(l);
  }

  function center(cellObj) { return { x: (cellObj.c + 0.5) * cell, y: (cellObj.r + 0.5) * cell }; }

  function drawPiece(piece) {
    var g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    g.setAttribute("class", "piece");
    g.setAttribute("data-id", piece.id);
    var thickness = cell * 0.62;

    if (piece.cells.length === 1) {
      var ct = center(piece.cells[0]);
      var rect = svgEl("rect", {
        x: ct.x - thickness / 2, y: ct.y - thickness / 2, width: thickness, height: thickness,
        rx: thickness * 0.35, fill: piece.color, class: "stroke",
      });
      g.appendChild(rect);
    } else {
      var pts = piece.cells.map(function (c) { var p = center(c); return p.x + "," + p.y; }).join(" ");
      var pl = svgEl("polyline", {
        points: pts, fill: "none", stroke: piece.color, "stroke-width": thickness,
        "stroke-linecap": "round", "stroke-linejoin": "round", class: "stroke",
      });
      g.appendChild(pl);
    }

    // Pilhode i ENDEN (hodecellen) der streken trekker seg ut, pekende utover.
    var d = Engine.DELTA[piece.dir];
    var lead = Engine.headCell(piece);
    var lc = center(lead), s = cell * 0.24;
    var ax = lc.x + d.c * cell * 0.30, ay = lc.y + d.r * cell * 0.30;
    var head = svgEl("polygon", { points: arrowPts(ax, ay, s, piece.dir), fill: "#ffffff", class: "stroke" });
    g.appendChild(head);

    g.addEventListener("click", function () { onPieceClick(piece.id); });
    svg.appendChild(g);
    return g;
  }

  function arrowPts(x, y, s, dir) {
    if (dir === "R") return [x, y, x - s * 1.5, y - s, x - s * 1.5, y + s].join(",");
    if (dir === "L") return [x, y, x + s * 1.5, y - s, x + s * 1.5, y + s].join(",");
    if (dir === "D") return [x, y, x - s, y - s * 1.5, x + s, y - s * 1.5].join(",");
    return [x, y, x - s, y + s * 1.5, x + s, y + s * 1.5].join(",");
  }
  function svgEl(tag, attrs) {
    var el = document.createElementNS("http://www.w3.org/2000/svg", tag);
    Object.keys(attrs).forEach(function (k) { el.setAttribute(k, attrs[k]); });
    return el;
  }

  // -- Blinkende farekant ---------------------------------------------------
  function randomEdge(not) {
    var edges = ["U", "D", "L", "R"].filter(function (e) { return e !== not; });
    return edges[Math.floor(Math.random() * edges.length)];
  }
  function edgeRectAttrs(edge) {
    var W = state.cols * cell, H = state.rows * cell, t = Math.max(7, cell * 0.3);
    var x = 0, y = 0, w = W, h = H;
    if (edge === "U") { h = t; }
    else if (edge === "D") { y = H - t; h = t; }
    else if (edge === "L") { w = t; }
    else { x = W - t; w = t; }
    return { x: x, y: y, width: w, height: h };
  }
  function removeDanger() {
    var ex = svg.querySelectorAll(".danger-edge, .danger-preview");
    for (var i = 0; i < ex.length; i++) ex[i].parentNode.removeChild(ex[i]);
  }
  // Tegner den aktive blinkende kanten (rød/grønn) + et oransje FORVARSEL på den
  // neste kanten (overlapper med den aktive de siste 0,5 sekundene).
  function drawDanger() {
    removeDanger();
    if (!dangerMode || !state) return;
    if (dangerEdge) {
      var a = edgeRectAttrs(dangerEdge);
      a.fill = dangerMode === 2 ? "#2ecc71" : "#e74c3c"; // grønn = mål, rød = unngå
      a.class = "danger-edge";
      svg.appendChild(svgEl("rect", a));
    }
    if (dangerPreviewEdge) {
      var p = edgeRectAttrs(dangerPreviewEdge);
      p.fill = "#f5a623"; p.class = "danger-preview"; // oransje forvarsel
      svg.appendChild(svgEl("rect", p));
    }
  }
  function configureDanger() {
    stopDanger();
    dangerMode = dangerModeForLevel(currentLevel());
    if (!dangerMode) { dangerEdge = null; dangerPreviewEdge = null; return; }
    dangerEdge = randomEdge(null);
    dangerPreviewEdge = null;
    drawDanger();
    scheduleDangerCycle();
  }
  function dangerIntervalMs() {
    return dangerMode === 2 ? DANGER_INTERVAL_REQUIRE : DANGER_INTERVAL_AVOID;
  }
  // Én syklus: kanten blinker (3 s rød / 5 s grønn). 0,5 s før byttet tennes et
  // oransje forvarsel på neste kant; ved byttet blir forvarselet den nye kanten.
  function scheduleDangerCycle() {
    var iv = dangerIntervalMs();
    var next = randomEdge(dangerEdge);
    dangerPreviewTimer = setTimeout(function () {
      dangerPreviewEdge = next; drawDanger();
    }, iv - DANGER_PREVIEW_MS);
    dangerSwitchTimer = setTimeout(function () {
      dangerEdge = next; dangerPreviewEdge = null; drawDanger();
      scheduleDangerCycle();
    }, iv);
  }
  function stopDanger() {
    if (dangerPreviewTimer) { clearTimeout(dangerPreviewTimer); dangerPreviewTimer = null; }
    if (dangerSwitchTimer) { clearTimeout(dangerSwitchTimer); dangerSwitchTimer = null; }
    dangerPreviewEdge = null;
    removeDanger();
  }
  // Straff (poeng) for å kjøre en strek UT i retning `dir` akkurat nå. 0 = trygt.
  function edgePenaltyFor(dir) {
    if (dangerMode === 1) return dir === dangerEdge ? EDGE_AVOID_PENALTY : 0;
    if (dangerMode === 2) return dir === dangerEdge ? 0 : EDGE_REQUIRE_PENALTY;
    return 0;
  }
  function flashDanger() {
    boardWrap.classList.remove("flash"); void boardWrap.offsetWidth; boardWrap.classList.add("flash");
  }

  // -- Interaksjon ----------------------------------------------------------
  // Ingen global lås: man kan trykke på streker hele tiden. Et trekk avgjøres
  // logisk MED ÉN GANG (poeng + fjerning), og slange-animasjonen er rent kosmetisk
  // så poeng-popups aldri hindrer flyten. Krasj gir en kort per-strek nedkjøling.
  function onPieceClick(id) {
    var piece = state && state.pieces[id];
    if (!piece || crashCooldown[id]) return;
    var info = Engine.firstCollision(state, piece);
    var g = svg.querySelector('[data-id="' + id + '"]');
    var token = boardToken;
    var headPos = boardPointToWrap(Engine.headCell(piece));

    if (info === null) {
      var penalty = edgePenaltyFor(piece.dir);
      if (penalty > 0) {
        // Utkjøring i feil/blinkende retning: streken forsvinner, men straffes hardt.
        combo = 0;
        var resP = Engine.attemptMove(state, id, { reward: -penalty });
        if (g) { g.setAttribute("data-id", "__gone__"); animateSnakeExit(g, piece, token); }
        afterExitUI(resP, headPos);
        popScore("−" + penalty, "var(--bad)", headPos, true);
        flashDanger();
        statusEl.textContent = dangerMode === 2
          ? "Feil kant! Du må treffe den blinkende kanten. −" + penalty + " poeng."
          : "Au! Du traff den blinkende kanten. −" + penalty + " poeng.";
        return;
      }
      // Vanlig utkjøring med hurtighetsbonus.
      var bonus = computeExitBonus();
      var res = Engine.attemptMove(state, id, { bonus: bonus.total });
      if (g) { g.setAttribute("data-id", "__gone__"); animateSnakeExit(g, piece, token); }
      afterExitUI(res, headPos);
      var color = bonus.total > 0 ? "#f5a623" : "var(--good)";
      popScore("+" + res.reward, color, headPos, false);
      if (bonus.combo > 0 && bonus.combo % COMBO_SHOW_EVERY === 0) showCombo("🔥 Kjede ×" + bonus.combo + "!", headPos);
      else if (bonus.ended >= COMBO_END_MIN) showCombo("Kjede ×" + bonus.ended + " ferdig", headPos);
      if (!res.gameOver && !res.solved) {
        statusEl.textContent = "Figur: " + currentIcon.name + "  ·  " + Object.keys(state.pieces).length + " streker igjen";
      }
    } else {
      // Krasj mot annen strek: rist, straff, blir stående.
      crashCooldown[id] = true;
      var endedChain = combo; combo = 0;
      var nudge = crashVector(piece, info.freeSteps);
      if (g) {
        g.style.setProperty("--tx", nudge.x + "px");
        g.style.setProperty("--ty", nudge.y + "px");
        g.style.transition = "transform .12s ease-out";
        g.style.transform = "translate(" + nudge.x + "px," + nudge.y + "px)";
        g.classList.add("crash");
      }
      var res2 = Engine.attemptMove(state, id);
      scoreEl.textContent = state.score; bumpScore();
      popScore("−" + state.config.crashPenalty, "var(--bad)", headPos, true);
      if (endedChain >= COMBO_END_MIN) showCombo("Kjede ×" + endedChain + " ferdig", headPos);
      statusEl.textContent = "Au! Den krasjet. Du mistet " + state.config.crashPenalty + " poeng.";
      setTimeout(function () {
        if (token !== boardToken) return;
        if (g) {
          g.classList.remove("crash");
          g.style.transition = "transform .18s ease-out";
          g.style.transform = "translate(0,0)";
        }
        delete crashCooldown[id];
        if (res2.gameOver) onLose();
      }, 360);
    }
  }

  // Felles oppdatering etter en utkjøring (poeng-pille, tap/seier).
  function afterExitUI(res, headPos) {
    peakScore = Math.max(peakScore, state.score);
    scoreEl.textContent = state.score; bumpScore();
    if (res.gameOver) onLose();
    else if (res.solved) onWin();
  }

  // Slange-utkjøring: hodet (enden med pilen) glir langs aksen, og kroppen følger
  // etter i hodets spor. En L-form retter seg dermed ut til en rett linje før den
  // forlater brettet. Vi tegner streken på nytt hver frame langs et "spor" som er
  // kroppens celler etterfulgt av strålen fra hodet og ut av brettet.
  function cellEq(a, b) { return a.r === b.r && a.c === b.c; }
  // Rent KOSMETISK slange-animasjon (poeng/fjerning er allerede avgjort i
  // onPieceClick). Animerer `g` ut av brettet og fjerner elementet til slutt.
  function animateSnakeExit(g, piece, token) {
    var d = Engine.DELTA[piece.dir];
    var head = Engine.headCell(piece);
    var hc = center(head);
    // Cellerekkefølge fra HALE til HODE (slik at siste punkt er hodet).
    var ordered = cellEq(piece.cells[0], head) ? piece.cells.slice().reverse() : piece.cells.slice();
    var bodyLen = ordered.length;
    var track = ordered.map(center);
    var rayLen = bodyLen + state.rows + state.cols + 2;
    for (var i = 1; i <= rayLen; i++) {
      track.push({ x: hc.x + d.c * i * cell, y: hc.y + d.r * i * cell });
    }
    // Punkt langs sporet ved kontinuerlig indeks (ekstrapolerer langs aksen utenfor).
    function ptAt(idx) {
      if (idx <= 0) return track[0];
      var last = track.length - 1;
      if (idx >= last) {
        var base = track[last];
        return { x: base.x + d.c * (idx - last) * cell, y: base.y + d.r * (idx - last) * cell };
      }
      var i0 = Math.floor(idx), f = idx - i0, a = track[i0], b = track[i0 + 1];
      return { x: a.x + (b.x - a.x) * f, y: a.y + (b.y - a.y) * f };
    }
    var shape = g.querySelector("polyline") || g.querySelector("rect");
    var arrow = g.querySelector("polygon");
    if (arrow && arrow.parentNode) arrow.parentNode.removeChild(arrow);
    var thickness = cell * 0.62;
    var startHead = bodyLen - 1, endHead = track.length - 1 + bodyLen;
    var dur = Math.min(950, 260 + (endHead - startHead) * 42);
    var t0 = null, done = false;

    function finish() {
      if (done || token !== boardToken) return; done = true;
      if (g.parentNode) g.parentNode.removeChild(g);
    }
    function frame(t) {
      if (token !== boardToken) return; // brettet er byttet ut
      if (t0 == null) t0 = t;
      var p = Math.min(1, (t - t0) / dur);
      var ease = p * p; // akselererer ut — slangen "skyter" mot kanten
      var headIdx = startHead + ease * (endHead - startHead);
      var pts = [];
      for (var j = 0; j < bodyLen; j++) pts.push(ptAt(headIdx - (bodyLen - 1) + j));
      if (shape.tagName.toLowerCase() === "polyline") {
        shape.setAttribute("points", pts.map(function (q) { return q.x + "," + q.y; }).join(" "));
      } else {
        var q = pts[bodyLen - 1];
        shape.setAttribute("x", q.x - thickness / 2);
        shape.setAttribute("y", q.y - thickness / 2);
      }
      if (p < 1) requestAnimationFrame(frame);
      else finish();
    }
    requestAnimationFrame(frame);
  }
  function crashVector(piece, freeSteps) {
    var n = Math.max(freeSteps, 0.25);
    var d = Engine.DELTA[piece.dir];
    return { x: d.c * n * cell, y: d.r * n * cell };
  }

  // Hurtighetsbonus: jo raskere etter forrige fjerning, jo større bonus — og
  // raske fjerninger på rad bygger en kjede (combo) som gir ekstra poeng.
  // Kjeden BEREGNES hver gang, men vises sjelden (se finish/krasj): kun ved hver
  // 10. streak og når en lang kjede tar slutt — så den ikke forstyrrer flowen.
  // `ended` = lengden på en kjede som nettopp ble brutt (0 hvis ingen).
  // Hurtighetsbonus er KONTINUERLIG: jo nærmere 0 sek, jo større (0,5 s slår 1 s).
  function speedBonusFor(gap) {
    var f = 1 - gap / SPEED_WINDOW;
    if (f < 0) f = 0;
    return Math.round(SPEED_MAX * f);
  }
  function computeExitBonus() {
    var gap = accumMs - lastExitAccum;
    lastExitAccum = accumMs;
    var ended = 0;
    if (gap < COMBO_WINDOW) combo++;        // fortsett kjeden
    else { ended = combo; combo = 0; }      // for sen: kjeden brytes
    var speed = speedBonusFor(gap);                       // 0–20, faller med tid
    var comboBonus = Math.min(combo, COMBO_CAP) * COMBO_STEP; // 0–45, vokser med streak
    return { speed: speed, comboBonus: comboBonus, total: speed + comboBonus, combo: combo, ended: ended, gap: gap };
  }
  var COMBO_SHOW_EVERY = 10;                  // vis kjede-popup ved hver 10. streak
  var COMBO_END_MIN = 10;                     // vis "ferdig"-popup kun for lange kjeder

  // Pikselposisjon (i boardWrap) for midten av en celle på brettet.
  function boardPointToWrap(cellObj) {
    var sr = svg.getBoundingClientRect(), wr = boardWrap.getBoundingClientRect();
    var c = center(cellObj);
    return { x: (sr.left - wr.left) + c.x, y: (sr.top - wr.top) + c.y };
  }

  function popScore(txt, color, pos, crash) {
    var el = document.createElement("div");
    el.className = "pop " + (crash ? "pop-crash" : "pop-good");
    el.textContent = txt; el.style.color = color;
    el.style.left = pos.x + "px"; el.style.top = pos.y + "px";
    boardWrap.appendChild(el);
    setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, crash ? 1000 : 850);
  }

  function showCombo(text, pos) {
    var el = document.createElement("div");
    el.className = "combo"; el.textContent = text;
    el.style.left = pos.x + "px"; el.style.top = pos.y + "px";
    boardWrap.appendChild(el);
    setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 1200);
  }

  function bumpScore() {
    var pill = scoreEl.parentNode;
    if (!pill) return;
    pill.classList.remove("bump"); void pill.offsetWidth; pill.classList.add("bump");
  }

  // -- Konfetti-eksplosjon (bibliotekfri) -----------------------------------
  var confettiRaf = null;
  function burstConfetti() {
    var canvas = $("confetti");
    if (!canvas || !canvas.getContext) return;
    var ctx;
    try { ctx = canvas.getContext("2d"); } catch (e) { return; } // canvas utilgjengelig
    if (!ctx) return; // ingen canvas-støtte (f.eks. i testmiljø)
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    var colors = ["#e8485f", "#f2b705", "#6c5ce7", "#2ecc71", "#36b1c9", "#ef6c3a", "#f4cf5a"];
    var rect = boardWrap.getBoundingClientRect();
    var cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
    var P = [];
    for (var i = 0; i < 160; i++) {
      var ang = Math.random() * Math.PI * 2, sp = 4 + Math.random() * 10;
      P.push({
        x: cx, y: cy, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp - 5,
        g: 0.16 + Math.random() * 0.14, size: 6 + Math.random() * 8,
        color: colors[i % colors.length], rot: Math.random() * 6.28,
        vr: (Math.random() - 0.5) * 0.45, life: 0, max: 80 + Math.random() * 50,
      });
    }
    if (confettiRaf) cancelAnimationFrame(confettiRaf);
    (function frame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      var alive = false;
      P.forEach(function (p) {
        if (p.life > p.max) return;
        alive = true; p.life++;
        p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
        ctx.save();
        ctx.globalAlpha = Math.max(0, 1 - p.life / p.max);
        ctx.translate(p.x, p.y); ctx.rotate(p.rot);
        ctx.fillStyle = p.color; ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
        ctx.restore();
      });
      if (alive) confettiRaf = requestAnimationFrame(frame);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    })();
  }

  // -- Slutt-tilstander -----------------------------------------------------
  function restartJourney() { startRun("journey"); journeyIndex = 0; nextJourney(); }

  function onWin() {
    burstConfetti();
    stopDanger();
    var doneLevel = currentLevel();
    var gain = state.score - boardStartScore;                 // poeng tjent på dette brettet
    var sec = (accumMs - boardStartAccumMs) / 1000;           // tid brukt på brettet
    recordLevelStats(doneLevel, currentIcon.name, gain, sec);
    runningScore = state.score; peakScore = Math.max(peakScore, state.score); levelsCompleted++;
    var nextIcon = journeyIcons[(journeyIndex + 1) % journeyIcons.length];
    var pct = boardMaxScore > 0 ? Math.max(0, Math.round(gain / boardMaxScore * 100)) : 0;
    var body =
      "<div class='hint' style='opacity:.7;margin-bottom:0'>Forrige figur:</div>" +
      "<div>" + miniIcon(currentIcon, 12) + "</div>" +
      "<div class='hint'>Du fikk <b>" + gain + "</b> av <b>" + boardMaxScore +
        "</b> mulige poeng på brettet (" + pct + " %).</div>" +
      "<div class='hint'>Level " + doneLevel + " var " + Icons.article(currentIcon) + " <b>" + currentIcon.name +
        "</b>. Neste level er " + Icons.article(nextIcon) + " <b>" + nextIcon.name + "</b>.</div>" +
      "<div class='hint' style='opacity:.7;margin-bottom:0'>Neste figur:</div>" +
      "<div>" + miniIcon(nextIcon, 12) + "</div>";
    showResumable("🎉 Du klarte level " + doneLevel + "!", body,
      [btn("Neste level →", function () { journeyIndex++; nextJourney(); })]);
  }

  function onLose() {
    stopDanger();
    stopTimer();
    var entry = makeEntry();
    recordTotalRun(entry);
    showResumable("💔 Du tapte", "<div class='hint'>Du kom til level " + currentLevel() + ".</div>" + recordsHtml(entry),
      [btn("🔄 Restart", restartJourney)]);
  }

  function makeEntry() {
    return { points: peakScore, timeSec: elapsedSec(), levels: levelsCompleted, date: Date.now() };
  }

  function showOverlay(title, bodyHtml, buttons) {
    picker.classList.remove("show");
    overlayTitle.textContent = title;
    overlayBody.innerHTML = bodyHtml || "";
    overlayBtns.innerHTML = "";
    (buttons || []).forEach(function (b) { overlayBtns.appendChild(b); });
    overlay.classList.add("show");
  }
  // "Blokkerende" skjermer (vinner/tap/regel) lagres som gjenopprettbare, slik at
  // f.eks. Rekorder-skjermen kan vises oppå og deretter lukkes TILBAKE til dem.
  var resumeOverlay = null;
  function showResumable(title, bodyHtml, buttons) {
    resumeOverlay = function () { showOverlay(title, bodyHtml, buttons); };
    resumeOverlay();
  }
  function hideOverlay() { overlay.classList.remove("show"); picker.classList.remove("show"); resumeOverlay = null; }
  function btn(label, fn) {
    var b = document.createElement("button"); b.textContent = label;
    b.addEventListener("click", fn); return b;
  }

  // -- Moduser --------------------------------------------------------------
  // Endeløs reise: ikonene sykler, vanskelighet + padding øker, og nye regler
  // introduseres på egne skjermer ved level 10 og 20.
  function nextJourney() {
    mode = "journey";
    var level = journeyIndex + 1;
    if (level === DANGER_LEVEL_AVOID && !rulesShown.avoid) { rulesShown.avoid = true; return showRule(1); }
    if (level === DANGER_LEVEL_REQUIRE && !rulesShown.require) { rulesShown.require = true; return showRule(2); }
    var icon = journeyIcons[journeyIndex % journeyIcons.length];
    loadLevel(icon, difficultyForIndex(journeyIndex));
  }

  function showRule(m) {
    stopDanger();
    if (m === 1) {
      showResumable("⚠️ Ny regel fra level 10",
        "<div class='hint' style='line-height:1.5'>Én av kantene <b style='color:#e74c3c'>blinker rødt</b> og bytter side hvert 3. sekund. Et <b style='color:#f5a623'>oransje varsel</b> viser hvor neste kant kommer.<br><br>" +
        "Kjører en strek <b>UT gjennom den blinkende røde kanten</b>, mister du <b>200 poeng</b>!<br><br>" +
        "Se pilretningen — unngå å sende streker mot den røde kanten.</div>",
        [btn("Jeg er klar! →", function () { nextJourney(); })]);
    } else {
      showResumable("⚠️ Ny regel fra level 20",
        "<div class='hint' style='line-height:1.5'>Nå snur det! Du må treffe <b style='color:#2ecc71'>BARE den blinkende grønne kanten</b>.<br><br>" +
        "Kjører en strek ut et <b>annet sted</b>, mister du <b>200 poeng</b>!<br><br>" +
        "Vent til riktig kant blinker grønt før du sender streken ut.</div>",
        [btn("Jeg er klar! →", function () { nextJourney(); })]);
    }
  }

  // Liten SVG-forhåndsvisning av en figur (per-celle-farge). s = cellestørrelse.
  function miniIcon(icon, s) {
    s = s || 5;
    var ic = Icons.iconToCells(icon);
    var w = ic.cols * s, h = ic.rows * s, rects = "";
    ic.cells.forEach(function (cl) {
      rects += '<rect x="' + cl.c * s + '" y="' + cl.r * s + '" width="' + (s - 0.6) + '" height="' + (s - 0.6) + '" rx="1" fill="' + (cl.color || icon.color) + '"/>';
    });
    return '<svg width="' + w + '" height="' + h + '">' + rects + "</svg>";
  }

  // -- Knapper --------------------------------------------------------------
  $("btnRestart").addEventListener("click", restartJourney);
  $("btnScores").addEventListener("click", function () {
    // Husk en eventuell blokkerende skjerm (vinner/tap/regel) så «Lukk» går dit.
    var back = resumeOverlay;
    showOverlay("🏆 Rekorder", recordsHtml(null), [btn("Lukk", function () {
      if (back) { resumeOverlay = back; back(); } else hideOverlay();
    })]);
  });
  var resizeT;
  window.addEventListener("resize", function () {
    clearTimeout(resizeT);
    resizeT = setTimeout(function () { if (state && currentIcon) { fitCell({ rows: state.rows, cols: state.cols }); render(); } }, 120);
  });

  // Start
  startRun("journey"); nextJourney();
})();
</script>
</body>
</html>
